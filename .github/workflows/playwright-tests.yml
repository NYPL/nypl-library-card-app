name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      PLAYWRIGHT_BASE_URL:
        required: false
        type: string

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      # Application Core
      NODE_ENV: development
      APP_ENV: qa
      PORT: 3000
      HOME: /root
      
      # NYPL API Endpoints (Mapped from GitHub Variables)
      PATRON_CREATION_URL: ${{ vars.PATRON_CREATION_URL_QA }}
      PATRON_VALIDATION_URL: ${{ vars.PATRON_VALIDATION_URL_QA }}
      SIERRA_API_BASE_URL_QA: ${{ vars.SIERRA_API_BASE_URL_QA }}
      
      # Authentication & External Keys (Mapped from GitHub Secrets)
      OAUTH_PROVIDER_URL: ${{ vars.OAUTH_PROVIDER_URL }}
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
      SIERRA_BASIC_AUTH_BASE64: ${{ secrets.SIERRA_BASIC_AUTH_BASE64 }}
      IPSTACK_KEY: ${{ secrets.IPSTACK_KEY }}
      
      # Monitoring/Telemetry (Disabled for Tests)
      NEW_RELIC_ENABLED: false
      NEW_RELIC_APP_NAME: "Library Card App Dev"
      
      # Playwright Specific
      PLAYWRIGHT_BASE_URL: ${{ inputs.PLAYWRIGHT_BASE_URL || 'http://localhost:3001' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3